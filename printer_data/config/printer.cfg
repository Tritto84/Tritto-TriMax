[idle_timeout]
timeout: 3600
gcode:
  TURN_OFF_HEATERS
  M18
  M107
  SET_PIN PIN=caselight VALUE=0

[gcode_macro START_PRINT]
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(80)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(260)|float %}
    # Start bed heating
    M140 S{BED_TEMP}
    # Use absolute coordinates
    G90
    # Reset the G-Code Z offset (adjust Z offset if needed)
    SET_GCODE_OFFSET Z=0.0
    # Home the printer
    G28
    # G28 Y 
    # G28 X
    # G28 Z
    # Move the nozzle near the bed
    G1 Z5 F3000
    G1 X-85 F3000
    # Wait for bed to reach temperature
    M190 S{BED_TEMP}
    BED_MESH_PROFILE LOAD=default
    #BED_MESH_CALIBRATE PRINT_MIN={params.PRINT_MIN} PRINT_MAX={params.PRINT_MAX} FORCE_NEW_MESH=True
    #BED_MESH_CALIBRATE PRINT_MIN={params.PRINT_MIN} PRINT_MAX={params.PRINT_MAX}
    # Set and wait for nozzle to reach temperature
    M109 S{EXTRUDER_TEMP}
    M117 
    # PRIME_LINE
    # G92 E0
    # G1 E5 F500
    # G1 X0 F5000
    # G1 X-50
    # G1 X0
    # G1 X-50
    # G1 X0
    # G1 X-50
    # G1 X200 
    # G1 Y200 F5000

[gcode_macro END_PRINT]
gcode:
   G28 X0 Y0
   M104 S0 T1 ; turn off extruder
   M104 S0 T0
   M140 S0 ; turn off bed
   G28 X0 Y0
   G0 Y350
   M106 P0 S0
   M106 P1 S0
   M84 S0
   M84 XYE; disable motors except Z


# prime the nozzle 
[gcode_macro PRIME_LINE]
gcode: 
    M117 Prime Line
    G92 E0 ;Reset Extruder
    # move z axis 
    G1 Z2.0 F3000 ;Move Z Axis up
    # move to prime position 
    G1 X1 Y30 Z0.28 F5000.0 ;Move to start position
    G1 X1 Y300.0 Z0.28 F1500.0 E15 ;Draw the first line
    G1 X3 Y300.0 Z0.28 F5000.0 ;Move to side a little
    G1 X3 Y50 Z0.28 F1500.0 E30 ;Draw the second line
    G92 E0 ;Reset Extruder
    G1 Z2.0 F3000 ;Move Z Axis up

