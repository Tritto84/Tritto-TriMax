########################################
# Extruder 0 (T0) - Left
########################################

[extruder]
step_pin: tool0: PD0
dir_pin: tool0: PD1
enable_pin: !tool0: PD2
heater_pin: tool0: PB13 
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 4.637
nozzle_diameter: 0.400 #set your nozzle diameter
filament_diameter: 1.750
max_extrude_only_distance: 500
max_extrude_only_velocity: 120
pressure_advance: 0.025 #to be calibrated
pressure_advance_smooth_time: 0.03 #to be calibrated
#control: pid
#control: pid   #### commented for initial
#pid_Kp: 22.2   #### commented for initial
#pid_Ki: 1.08   #### commented for initial
#pid_Kd: 114    #### commented for initial
max_power: 1.0
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: tool0:PA3
pullup_resistor: 4700 #2200
min_temp: 5
max_temp: 300  #revo voron
min_extrude_temp: 180

[tmc2209 extruder]
uart_pin: tool0: PA15
interpolate: true
run_current: 0.85 #**
hold_current: 0.100
sense_resistor: 0.11 #**
stealthchop_threshold: 0
#driver_TBL: 0
#driver_HEND: 6
#driver_HSTRT: 7
#driver_TOFF: 

#uart_pin: tool0: PA15
#tx_pin: tool0:PA9
#interpolate: False
#run_current: 0.5
#stealthchop_threshold: 0

[heater_fan extruder_t0_fan]
pin: tool0: PA1  # "FAN1"
heater: extruder
heater_temp: 50.0
fan_speed: 1.0

[fan_generic print_cooling_t0]       # part cooling fan
pin: tool0: PA0
cycle_time: 0.0100
kick_start_time: 1.00
hardware_pwm: false

