# This file is an example config file for corexy (and also h-bot)
# style printers. One may copy and edit this file to configure a new
# corexy printer.

# DO NOT COPY THIS FILE WITHOUT CAREFULLY READING AND UPDATING IT
# FIRST. Incorrectly configured parameters may cause damage.

# See docs/Config_Reference.md for a description of parameters.

#klipper-backup

[mcu] # OCTOPUS V1.1
canbus_uuid: 9cf308417c6c  ##### GLENS OTCOPUS d9d9615efd36 
#serial: /dev/serial/by-id/usb-Klipper_stm32f446xx_200032000851363131363530-if00

# [mcu head0] # EBB 42 v1.2
# canbus_uuid: 6a8ba59741a3

# [mcu head1] # EBB 42 v1.2
# canbus_uuid: 41de702ed0db

[mcu head2] # EBB 42 v1.2
canbus_uuid: 5f1a813d3e95

[mcu head3] # EBB 42 v1.2
canbus_uuid: dad4e05f70b8

# [mcu head4] # EBB 42 v1.2
# canbus_uuid: ########


#####################################################################
# Printer kinematics
#####################################################################

[printer]
kinematics: corexy
max_velocity: 150 #300  
max_accel: 150 #3000             #Max 4000
max_z_velocity: 15          #Max 15 for 12V TMC Drivers, can increase for 24V
max_z_accel: 10 #350
square_corner_velocity: 5.0

#####################################################################
#  Printer Configuration
#####################################################################


[save_variables]
filename: ~/printer_data/config/klipper-toolchanger/offset_save_file.cfg

[force_move]
enable_force_move: true

[exclude_object]

[input_shaper]

[respond]

##############################################





[stepper_x]
step_pin: PF0
dir_pin: PF1
enable_pin: !PD7
microsteps: 16
rotation_distance: 40
endstop_pin: ^PE5
position_endstop: 0
position_max: 200
homing_speed: 50

[stepper_y]
step_pin: PF6
dir_pin: PF7
enable_pin: !PF2
microsteps: 16
rotation_distance: 40
endstop_pin: ^PJ1
position_endstop: 0
position_max: 200
homing_speed: 50

[stepper_z]
step_pin: PL3
dir_pin: PL1
enable_pin: !PK0
microsteps: 16
rotation_distance: 8
endstop_pin: ^PD3
position_endstop: 0.5
position_max: 200

[extruder]
step_pin: PA4
dir_pin: PA6
enable_pin: !PA2
microsteps: 16
rotation_distance: 33.500
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PB4
sensor_type: ATC Semitec 104GT-2
sensor_pin: PK5
control: pid
pid_Kp: 22.2
pid_Ki: 1.08
pid_Kd: 114
min_temp: 0
max_temp: 250

[heater_bed]
heater_pin: PH5
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PK6
control: watermark
min_temp: 0
max_temp: 130

[fan]
pin: PH6
